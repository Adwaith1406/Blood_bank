<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Donor - LifeLine Blood Bank</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { background-color: #f0f2f5; min-height: 100vh; }
        .navbar { background-color: #212529 !important; }
        .auth-container { display: none; }
        .auth-container.show { display: block; }
        .form-container { display: none; }
        .form-container.show { display: block; }
        .tab-content { margin-top: 20px; }
    </style>
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark sticky-top">
        <div class="container">
            <a class="navbar-brand fw-bold" href="index.html"><i class="fas fa-tint me-2 text-danger"></i>LifeLine</a>
            <div class="navbar-nav ms-auto" id="navbarRight">
                <span id="userGreeting" class="text-white me-3" style="display:none;"></span>
                <button id="logoutBtn" type="button" class="btn btn-outline-light btn-sm" style="display:none;">Logout</button>
                <a href="index.html" class="btn btn-outline-light btn-sm" id="backBtn">Back to Home</a>
            </div>
        </div>
    </nav>

    <!-- Auth Container (Login/Register) -->
    <div class="auth-container show">
        <div class="container py-5">
            <div class="row justify-content-center">
                <div class="col-md-6">
                    <div class="card shadow-lg border-0">
                        <div class="card-header bg-danger text-white text-center py-3">
                            <h4>Donor Portal</h4>
                        </div>
                        <div class="card-body p-4">
                            <!-- Tabs for Login/Register -->
                            <ul class="nav nav-tabs mb-3" id="authTabs" role="tablist">
                                <li class="nav-item" role="presentation">
                                    <button class="nav-link active" id="login-tab" data-bs-toggle="tab" data-bs-target="#login" type="button" role="tab">Login</button>
                                </li>
                                <li class="nav-item" role="presentation">
                                    <button class="nav-link" id="register-tab" data-bs-toggle="tab" data-bs-target="#register" type="button" role="tab">Register</button>
                                </li>
                            </ul>

                            <div class="tab-content" id="authTabContent">
                                <!-- Login Tab -->
                                <div class="tab-pane fade show active" id="login" role="tabpanel">
                                    <form id="loginForm">
                                        <div class="mb-3">
                                            <label class="form-label">Email</label>
                                            <input type="email" class="form-control" id="loginEmail" required>
                                        </div>
                                        <div class="mb-3">
                                            <label class="form-label">Password</label>
                                            <input type="password" class="form-control" id="loginPassword" required>
                                        </div>
                                        <button type="submit" class="btn btn-danger w-100 py-2">Login</button>
                                    </form>
                                </div>

                                <!-- Register Tab -->
                                <div class="tab-pane fade" id="register" role="tabpanel">
                                    <form id="registerForm">
                                        <div class="row">
                                            <div class="col-md-6 mb-3">
                                                <label class="form-label">First Name</label>
                                                <input type="text" class="form-control" id="regFirstName" required>
                                            </div>
                                            <div class="col-md-6 mb-3">
                                                <label class="form-label">Last Name</label>
                                                <input type="text" class="form-control" id="regLastName" required>
                                            </div>
                                        </div>
                                        <div class="mb-3">
                                            <label class="form-label">Address</label>
                                            <input type="text" class="form-control" id="regAddress" required>
                                        </div>
                                        <div class="row">
                                            <div class="col-md-6 mb-3">
                                                <label class="form-label">Email</label>
                                                <input type="email" class="form-control" id="regEmail" required>
                                            </div>
                                            <div class="col-md-6 mb-3">
                                                <label class="form-label">Password</label>
                                                <input type="password" class="form-control" id="regPassword" required>
                                            </div>
                                        </div>
                                        <div class="row">
                                            <div class="col-md-6 mb-3">
                                                <label class="form-label">Phone Number</label>
                                                <input type="tel" class="form-control" id="regPhone" required>
                                            </div>
                                            <div class="col-md-6 mb-3">
                                                <label class="form-label">Blood Group</label>
                                                <select class="form-select" id="regBloodGroup" required>
                                                    <option value="" disabled selected>Select</option>
                                                    <option>A+</option><option>A-</option>
                                                    <option>B+</option><option>B-</option>
                                                    <option>O+</option><option>O-</option>
                                                    <option>AB+</option><option>AB-</option>
                                                </select>
                                            </div>
                                        </div>
                                        <div class="row">
                                            <div class="col-md-6 mb-3">
                                                <label class="form-label">Height (cm)</label>
                                                <input type="number" class="form-control" id="regHeight" required>
                                            </div>
                                            <div class="col-md-6 mb-3">
                                                <label class="form-label">Weight (kg)</label>
                                                <input type="number" class="form-control" id="regWeight" required>
                                            </div>
                                        </div>
                                        <div class="mb-3">
                                            <label class="form-label">Any Medications / Existing Conditions</label>
                                            <textarea class="form-control" id="regMedications" rows="2" placeholder="List any medications or conditions (or type 'None')" required></textarea>
                                        </div>
                                        <button type="submit" class="btn btn-danger w-100 py-2">Register</button>
                                    </form>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Donor Form Container (shown after auth) -->
    <div class="form-container">
        <div class="container py-5">
            <div class="row justify-content-center">
                <div class="col-md-6">
                    <div class="card shadow-lg border-0">
                        <div class="card-header bg-danger text-white text-center py-3">
                            <h4>Donor Information</h4>
                        </div>
                        <div class="card-body p-4">
                            <form id="donorForm">
                                <div class="row">
                                    <div class="col-md-6 mb-3">
                                        <label class="form-label">First Name</label>
                                        <input type="text" class="form-control" id="fName" required>
                                    </div>
                                    <div class="col-md-6 mb-3">
                                        <label class="form-label">Last Name</label>
                                        <input type="text" class="form-control" id="lName" required>
                                    </div>
                                </div>
                                <div class="mb-3">
                                    <label class="form-label">Blood Group</label>
                                    <select class="form-select" id="bloodGroup">
                                        <option>A+</option><option>B+</option><option>O+</option><option>AB+</option>
                                        <option>A-</option><option>B-</option><option>O-</option><option>AB-</option>
                                    </select>
                                </div>
                                <div class="mb-3">
                                    <label class="form-label">Phone Number</label>
                                    <input type="tel" class="form-control" id="phone" required>
                                </div>
                                <button type="submit" class="btn btn-danger w-100 py-2">Submit Donor Info</button>
                            </form>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        // Auth utility functions
        function getDonors() {
            const data = localStorage.getItem('bloodbank_donors');
            return data ? JSON.parse(data) : [];
        }

        function saveDonors(donors) {
            localStorage.setItem('bloodbank_donors', JSON.stringify(donors));
        }

        function getCurrentUser() {
            const data = localStorage.getItem('bloodbank_currentUser');
            return data ? JSON.parse(data) : null;
        }

        function setCurrentUser(user) {
            localStorage.setItem('bloodbank_currentUser', JSON.stringify(user));
        }

        function logout() {
            localStorage.removeItem('bloodbank_currentUser');
            location.reload();
        }

        function updateUI() {
            const user = getCurrentUser();
            const authContainer = document.querySelector('.auth-container');
            const formContainer = document.querySelector('.form-container');
            const userGreeting = document.getElementById('userGreeting');
            const logoutBtn = document.getElementById('logoutBtn');

            if (user && user.role === 'donor') {
                authContainer.classList.remove('show');
                formContainer.classList.add('show');
                userGreeting.textContent = `Welcome, ${user.name}!`;
                userGreeting.style.display = 'inline';
                logoutBtn.style.display = 'inline-block';
            } else {
                authContainer.classList.add('show');
                formContainer.classList.remove('show');
                userGreeting.style.display = 'none';
                logoutBtn.style.display = 'none';
            }
        }

        // Login handler
        document.getElementById('loginForm').onsubmit = (e) => {
            e.preventDefault();
            const email = document.getElementById('loginEmail').value;
            const password = document.getElementById('loginPassword').value;

            const donors = getDonors();
            const donor = donors.find(d => d.email === email && d.password === password);

            if (donor) {
                setCurrentUser({ role: 'donor', name: donor.firstName, email: donor.email });
                updateUI();
                document.getElementById('loginForm').reset();
            } else {
                alert('Invalid email or password');
            }
        };

        // Register handler
        document.getElementById('registerForm').onsubmit = (e) => {
            e.preventDefault();
            const firstName = document.getElementById('regFirstName').value;
            const lastName = document.getElementById('regLastName').value;
            const email = document.getElementById('regEmail').value;
            const password = document.getElementById('regPassword').value;
            const phone = document.getElementById('regPhone').value;
            const bloodGroup = document.getElementById('regBloodGroup').value;
            const address = document.getElementById('regAddress').value;
            const height = document.getElementById('regHeight').value;
            const weight = document.getElementById('regWeight').value;
            const medications = document.getElementById('regMedications').value;

            const donors = getDonors();
            if (donors.find(d => d.email === email)) {
                alert('Email already registered');
                return;
            }

            donors.push({ firstName, lastName, email, password, phone, bloodGroup, address, height, weight, medications });
            saveDonors(donors);
            setCurrentUser({ role: 'donor', name: firstName, email });
            updateUI();
            document.getElementById('registerForm').reset();
        };

        // Donor form handler
        document.getElementById('donorForm').onsubmit = (e) => {
            e.preventDefault();
            const donorData = {
                first_name: document.getElementById('fName').value,
                last_name: document.getElementById('lName').value,
                blood_group: document.getElementById('bloodGroup').value,
                phone: document.getElementById('phone').value
            };
            alert('Donor info submitted: ' + donorData.first_name);
            document.getElementById('donorForm').reset();
        };

        // Logout handler
        document.getElementById('logoutBtn').onclick = logout;

        // Initialize on page load
        window.onload = updateUI;
    </script>
</body>
</html>
