<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Register as Donor</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
    <div class="container py-5">
        <div class="row justify-content-center">
            <div class="col-md-6">
                <div class="card shadow-lg border-0">
                    <div class="card-header bg-danger text-white text-center py-3">
                        <h4>Donor Information</h4>
                    </div>
                    <div class="card-body p-4">
                        <form id="donorForm">
                            <div class="row">
                                <div class="col-md-6 mb-3">
                                    <label class="form-label">First Name</label>
                                    <input type="text" class="form-control" id="fName" required>
                                </div>
                                <div class="col-md-6 mb-3">
                                    <label class="form-label">Last Name</label>
                                    <input type="text" class="form-control" id="lName" required>
                                </div>
                            </div>
                            <div class="mb-3">
                                <label class="form-label">Blood Group</label>
                                <select class="form-select" id="bloodGroup">
                                    <option>A+</option><option>B+</option><option>O+</option><option>AB+</option>
                                    <option>A-</option><option>B-</option><option>O-</option><option>AB-</option>
                                </select>
                            </div>
                            <div class="mb-3">
                                <label class="form-label">Phone Number</label>
                                <input type="tel" class="form-control" id="phone" required>
                            </div>
                            <button type="submit" class="btn btn-danger w-100 py-2">Submit Registration</button>
                        </form>
                    </div>
                </div>
                <div class="text-center mt-3"><a href="index.html" class="text-muted text-decoration-none">← Back to Dashboard</a></div>
            </div>
        </div>
    </div>

    <script>
        document.getElementById('donorForm').onsubmit = async (e) => {
            e.preventDefault();
            const donorData = {
                first_name: document.getElementById('fName').value,
                last_name: document.getElementById('lName').value,
                blood_group: document.getElementById('bloodGroup').value,
                phone: document.getElementById('phone').value
            };
            // This connects to the backend API your partners are building
            alert("Data captured for: " + donorData.first_name);
        };
    </script>
</body>
</html>
