<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Blood Inventory | LifeLine</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { background-color: #f0f2f5; min-height: 100vh; }
        .navbar { background-color: #212529 !important; }
        .status-badge { font-size: 0.8rem; padding: 5px 10px; border-radius: 20px; }
        .bg-available { background-color: #d1e7dd; color: #0f5132; }
        .bg-critical { background-color: #f8d7da; color: #842029; }
    </style>
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark shadow-sm">
        <div class="container">
            <a class="navbar-brand fw-bold" href="index.html">LifeLine</a>
            <a href="index.html" class="btn btn-outline-light btn-sm">Back to Home</a>
        </div>
    </nav>

    <div class="container my-5">
        <div class="card border-0 shadow-sm rounded-4">
            <div class="card-header bg-white border-0 py-3">
                <h4 class="mb-0 fw-bold">Current Blood Inventory</h4>
            </div>
            <div class="card-body p-0">
                <div class="table-responsive">
                    <table class="table table-hover mb-0">
                        <thead class="table-light">
                            <tr>
                                <th class="ps-4">Blood Group</th>
                                <th>Component</th>
                                <th>Units</th>
                                <th>Status/Expiry</th>
                                <th class="text-center">Action</th>
                            </tr>
                        </thead>
                        <tbody id="inventoryTableBody">
                            <tr>
                                <td colspan="5" class="text-center py-5">
                                    <div class="spinner-border text-danger mb-2" role="status"></div>
                                    <p>Connecting to PostgreSQL Database...</p>
                                </td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>

    <script>
        async function loadInventory() {

            try {
                const response = await fetch('/api/inventory');
                const data = await response.json();
                const tableBody = document.getElementById('inventoryTableBody');
                tableBody.innerHTML = ''; 

                if (data.length === 0) {
                    tableBody.innerHTML = '<tr><td colspan="5" class="text-center">No data in database.</td></tr>';
                    return;
                }

                data.forEach(item => {
                    tableBody.innerHTML += `
                        <tr>
                            <td class="ps-4 fw-bold text-danger">${item.blood_group}</td>
                            <td>${item.component_type}</td>
                            <td>${item.quantity}</td>
                            <td><span class="status-badge ${item.status === 'Available' ? 'bg-available' : 'bg-critical'}">${item.status}</span></td>
                            <td class="text-center"><button class="btn btn-sm btn-outline-dark">Details</button></td>
                        </tr>`;
                });
            } catch (e) {
                document.getElementById('inventoryTableBody').innerHTML = '<tr><td colspan="5" class="text-center text-danger">Database Connection Failed.</td></tr>';
            }
        }
        window.onload = loadInventory;
    </script>
</body>
</html>
