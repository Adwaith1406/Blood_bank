<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Emergency Request</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
    <div class="container py-5">
        <div class="row justify-content-center">
            <div class="col-md-6">
                <div class="card shadow-lg border-0">
                    <div class="card-header bg-dark text-white text-center py-3">
                        <h4>Hospital Request Form</h4>
                    </div>
                    <div class="card-body p-4">
                        <form id="requestForm">
                            <div class="mb-3">
                                <label class="form-label">Hospital Name</label>
                                <input type="text" class="form-control" id="hospName" required>
                            </div>
                            <div class="row">
                                <div class="col-md-6 mb-3">
                                    <label class="form-label">Blood Group Needed</label>
                                    <select class="form-select" id="reqGroup">
                                        <option>A+</option><option>B+</option><option>O+</option><option>AB+</option>
                                    </select>
                                </div>
                                <div class="col-md-6 mb-3">
                                    <label class="form-label">Units (Quantity)</label>
                                    <input type="number" class="form-control" id="units" min="1" required>
                                </div>
                            </div>
                            <div class="mb-4">
                                <label class="form-label">Urgency Level</label>
                                <select class="form-select" id="urgency">
                                    <option>Normal</option>
                                    <option class="text-danger fw-bold">EMERGENCY</option>
                                </select>
                            </div>
                            <button type="submit" class="btn btn-dark w-100 py-2">Send Request</button>
                        </form>
                    </div>
                </div>
                <div class="text-center mt-3"><a href="index.html" class="text-muted text-decoration-none">← Back to Dashboard</a></div>
            </div>
        </div>
    </div>
</body>
</html>
